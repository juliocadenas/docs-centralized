services:
  # ==============================================================
  # AI HUB GATEWAY - FastAPI principal (siempre activo)
  # ==============================================================
  ai-hub-gateway:
    build: .
    container_name: ai-hub-gateway
    ports:
      - "9000:9000"
    environment:
      # Service URLs (use host.docker.internal to reach host services)
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - COMFYUI_BASE_URL=http://host.docker.internal:8188
      - DOCUMUSIC_BASE_URL=http://host.docker.internal:7860
      - WAN2GP_BASE_URL=http://host.docker.internal:7861
      - PIPER_TTS_URL=http://host.docker.internal:8010
      - XTTS_V2_URL=http://host.docker.internal:8011
      - FISH_SPEECH_URL=http://host.docker.internal:8012
      - WHISPER_STT_URL=http://host.docker.internal:8020
      - REMBG_URL=http://host.docker.internal:8050
      - UPSCALE_URL=http://host.docker.internal:8051
      - MUSETALK_URL=http://host.docker.internal:8040
      - LATENTSYNC_URL=http://host.docker.internal:8043
      - LIVEPORTRAIT_URL=http://host.docker.internal:8044
      - HALLO2_URL=http://host.docker.internal:8070
      - HIGGSFIELD_URL=http://host.docker.internal:8052
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # GPU access for nvidia-smi monitoring
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==============================================================
  # VOICE - TTS y STT
  # Activar: docker compose --profile voice up -d
  # ==============================================================

  # Piper TTS - Fast CPU-based TTS (siempre activo, consume ~200MB RAM)
  piper-tts:
    image: rhasspy/wyoming-piper:latest
    container_name: piper-tts
    ports:
      - "8010:10200"
    volumes:
      - /mnt/seagate/models/voice/tts/piper:/data
    command: >
      python3 -m wyoming_piper
      --uri tcp://0.0.0.0:10200
      --piper /usr/lib/wyoming-piper/piper
      --voice es_ES-davefx-medium
      --data-dir /data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10200"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles: ["voice", "full"]

  # XTTS-v2 - Multilingual TTS with voice cloning (GPU)
  # Activar: docker compose --profile voice up xtts-v2 -d
  xtts-v2:
    image: ghcr.io/coqui-ai/xtts-streaming-server:latest
    container_name: xtts-v2
    ports:
      - "8011:80"
    volumes:
      - /mnt/seagate/models/voice/tts/xtts-v2:/root/.local/share/coqui
    environment:
      - COQUI_TOS_AGREED=1
    restart: unless-stopped
    profiles: ["voice", "full"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Fish Speech - Natural voice TTS (GPU)
  fish-speech:
    image: fishaudio/fish-speech:latest
    container_name: fish-speech
    ports:
      - "8012:80"
    volumes:
      - /mnt/seagate/models/voice/tts/fish-speech:/app/models
    restart: unless-stopped
    profiles: ["voice", "full"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Whisper STT - Speech to Text (GPU)
  # Activar: docker compose --profile voice up whisper-stt -d
  whisper-stt:
    build:
      context: ./services/whisper-stt
      dockerfile: Dockerfile
    container_name: whisper-stt
    ports:
      - "8020:8000"
    volumes:
      - /mnt/seagate/models/voice/stt:/models
    environment:
      - WHISPER_MODEL=large-v3
      - WHISPER_DEVICE=cuda
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    profiles: ["voice", "full"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==============================================================
  # EFFECTS - Background removal y Upscale
  # Activar: docker compose --profile effects up -d
  # ==============================================================

  # Rembg - Background removal (CPU, ligero)
  rembg:
    image: danielgatis/rembg:latest
    container_name: rembg
    ports:
      - "8050:80"
    command: ["s", "-p", "80"]
    restart: unless-stopped
    profiles: ["effects", "full"]

  # Real-ESRGAN - Image upscale (GPU)
  upscale:
    build:
      context: ./services/upscale
      dockerfile: Dockerfile
    container_name: upscale
    ports:
      - "8051:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles: ["effects", "full"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ==============================================================
  # AVATAR - Lip-sync, Portrait Animation
  # Activar: docker compose --profile avatar up -d
  # ==============================================================

  # MuseTalk - Real-time lip-sync (GPU)
  musetalk:
    build:
      context: ./services/musetalk
      dockerfile: Dockerfile
    container_name: musetalk
    ports:
      - "8040:7860"
    volumes:
      - /mnt/seagate/models/avatar/musetalk:/models
    shm_size: "4gb"
    restart: unless-stopped
    profiles: ["avatar", "full"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # LivePortrait - Portrait animation (GPU)
  liveportrait:
    build:
      context: ./services/liveportrait
      dockerfile: Dockerfile
    container_name: liveportrait
    ports:
      - "8044:7860"
    volumes:
      - /mnt/seagate/models/avatar/liveportrait:/models
    shm_size: "4gb"
    restart: unless-stopped
    profiles: ["avatar", "full"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]