# ============================================================================
# Kernel panic behavior - Auto-reboot instead of hanging
# ============================================================================
# This ensures the kernel auto-reboots after panics instead of hanging
# and potentially requiring physical intervention.
#
# Install: /etc/sysctl.d/99-panic-reboot.conf
# Apply: sudo sysctl --system
# ============================================================================

# Auto-reboot 10 seconds after a kernel panic
kernel.panic = 10

# Panic on oops (don't continue running in an unstable state)
# This is CRITICAL: an unstable kernel can corrupt the filesystem
kernel.panic_on_oops = 1

# Panic on warn-then-oops sequence
kernel.panic_on_warn = 0

# Enable magic SysRq (needed for remote recovery via /proc/sysrq-trigger)
# 1 = enable all functions (sync, remount-ro, reboot)
kernel.sysrq = 1

# ============================================================================
# Memory / OOM behavior
# ============================================================================

# Don't over-commit memory (prevents OOM situations from arising)
# 2 = don't allow allocations that can't be handled by swap + RAM
# This makes OOM situations predictable rather than random
# vm.overcommit_memory = 1   # (Commented: AI workloads need overcommit, leave at kernel default)

# How likely the OOM killer is to trigger (higher = more likely)
# Range: -1000 (never kill) to 1000 (always kill)
# We leave this at kernel default and manage per-service via OOMScoreAdjust

# ============================================================================
# Filesystem / disk behavior
# ============================================================================

# Maximum number of file watchers (AI services need many)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 512

# ============================================================================
# Networking (for remote recovery)
# ============================================================================

# Keep network interface up during shutdown (allows remote sync)
# net.ipv4.conf.all.promote_secondaries = 1