# ============================================================================
# OOM Protection Drop-in files for critical services
# ============================================================================
# These files go into /etc/systemd/system/<service>.d/ directories
# They protect critical services from being killed by the OOM killer
# ============================================================================

# ============================================================================
# FILE: /etc/systemd/system/ollama.service.d/oom-protect.conf
# ============================================================================
[Service]
# Never let OOM killer touch Ollama (our always-on LLM)
OOMScoreAdjust=-1000
# Also protect from memory cgroup killing
OOMPolicy=continue

# ============================================================================
# FILE: /etc/systemd/system/ai-hub-gateway.service.d/oom-protect.conf
# ============================================================================
[Service]
# High protection for gateway (but can be killed in extreme cases)
OOMScoreAdjust=-500
# Limit gateway memory to 4GB (prevents it from eating all RAM)
MemoryMax=4G
MemoryHigh=3G
# If it exceeds limits, restart rather than crash the system
OOMPolicy=stop

# ============================================================================
# FILE: /etc/systemd/system/vram-watchdog.service.d/no-oom.conf
# (Already in the main service file, but duplicated here for clarity)
# ============================================================================
[Service]
OOMScoreAdjust=-1000

# ============================================================================
# HOW TO APPLY (for the deployment script)
# ============================================================================
# sudo mkdir -p /etc/systemd/system/ollama.service.d/
# sudo cp oom-protect-ollama.conf /etc/systemd/system/ollama.service.d/oom-protect.conf
# sudo mkdir -p /etc/systemd/system/ai-hub-gateway.service.d/
# sudo cp oom-protect-gateway.conf /etc/systemd/system/ai-hub-gateway.service.d/oom-protect.conf
# sudo systemctl daemon-reload